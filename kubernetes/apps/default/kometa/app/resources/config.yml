libraries:
  Anime:
    collection_files:
      - default: basic
      - default: network
      - default: streaming
    overlay_files:
      - default: status
  Movies:
    collection_files:
      - default: aspect
      - default: based
      - default: basic
      - default: collectionless
      - default: content_rating_au
      - default: country
        template_variables:
          include:
            - Australia
            - Italy
            - Russia
      - default: emmy
      - default: golden
      - default: oscars
      - default: resolution
      - default: seasonal
      - default: streaming
        template_variables:
          originals_only: true
          exclude:
            - tubi
          style: "white"
      - default: tmdb
      - default: universe
  "TV Shows":
    collection_files:
      - default: aspect
      - default: based
      - default: basic
      - default: collectionless
      - default: content_rating_au
      - default: country
        template_variables:
          include:
            - Australia
            - Italy
            - Russia
      - default: emmy
      - default: golden
      - default: network
      - default: resolution
      - default: streaming
        template_variables:
          originals_only: true
          exclude:
            - tubi
          style: "white"
      - default: tmdb
      - default: universe
    overlay_files:
      - default: content_rating_au
      - default: status
      - default: aspect
      - default: audio_codec
      - default: resolution
      - default: network
      - default: streaming
      - default: studio
  "Фильмы":
    collection_files:
      - default: basic
      - default: streaming

plex:
  url: http://plex.default.svc.cluster.local:32400
  token: <<PLEX_API_KEY>>

tmdb:
  apikey: <<TMDB_API_KEY>>

settings:
  delete_below_minimum: true
  minimum_items: 2
  overlay_artwork_filetype: webp_lossless
